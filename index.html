<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Dashboard IoT con python y github pages</h1>

    <h2>Temperatura: <span id="temperatura">--</span> °C</h2>
    <h2>Humedad: <span id="humedad">--</span> %</h2>
    <p>Última actualizacion: <span id="fecha">--</span></p>
    <script>
        fetch("datos.json")
            .then(respuesta => respuesta.json())
            .then(datos => {
                document.getElementById("temperatura").textContent = datos.temperatura;
                document.getElementById("humedad").textContent = datos.humedad;
                document.getElementById("fecha").textContent = datos.fecha_hora;
            });
    </script>
</body>
</html>
